name: Validate course

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  TESTINGPLATFORM_TELEMETRY_OPTOUT: "1"

jobs:
  build-test-and-run:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore locked dependencies
        run: dotnet restore LearningCSharp.slnx --locked-mode

      - name: Verify formatting and analyzer fixes
        if: matrix.os == 'ubuntu-latest'
        run: dotnet format LearningCSharp.slnx --verify-no-changes --no-restore

      - name: Build all course artifacts
        run: dotnet build LearningCSharp.slnx --configuration Release --no-restore

      - name: Run all solution tests
        run: dotnet test --solution LearningCSharp.slnx --configuration Release --no-build

      - name: Verify course manifest, samples, and local links
        run: dotnet run --project tools/CourseVerifier --configuration Release --no-build -- verify

      - name: Verify learner starter feedback
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet run --project tools/CourseVerifier --configuration Release --no-build -- starters
          dotnet test --project capstone/reading-log/Tests/ReadingLog.Tests.csproj --configuration Release -p:CapstoneImplementation=Starter -- --filter-class ReadingLog.Tests.Smoke.StarterSmokeTests

      - name: Enforce capstone branch coverage
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet test --project capstone/reading-log/Tests/ReadingLog.Tests.csproj --configuration Release --no-build --results-directory capstone/reading-log/Tests/TestResults -- --coverage --coverage-output solution-coverage.cobertura.xml --coverage-output-format cobertura --coverage-settings capstone/reading-log/Tests/coverage.runsettings
          dotnet run --project tools/CourseVerifier --configuration Release --no-build -- coverage capstone/reading-log/Tests 0.85

      - name: Verify external documentation links
        if: matrix.os == 'ubuntu-latest'
        run: dotnet run --project tools/CourseVerifier --configuration Release --no-build -- external-links
