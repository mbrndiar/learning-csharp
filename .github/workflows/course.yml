name: Validate course

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  TESTINGPLATFORM_TELEMETRY_OPTOUT: "1"

jobs:
  build-test-and-run:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore locked dependencies
        run: dotnet restore LearningCSharp.slnx --locked-mode

      - name: Verify formatting and analyzer fixes
        if: matrix.os == 'ubuntu-latest'
        run: dotnet format LearningCSharp.slnx --verify-no-changes --no-restore

      - name: Build all course artifacts
        run: dotnet build LearningCSharp.slnx --configuration Release --no-restore

      - name: Run all solution tests
        run: dotnet test --solution LearningCSharp.slnx --configuration Release --no-build

      - name: Verify course manifest, samples, and local links
        run: dotnet run --project tools/CourseVerifier --configuration Release --no-build -- verify

      - name: Verify learner starter feedback
        if: matrix.os == 'ubuntu-latest'
        run: dotnet run --project tools/CourseVerifier --configuration Release --no-build -- starters

      - name: Enforce project and capstone branch coverage
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet test --project projects/tasks/tests/Tasks.Tests/Tasks.Tests.csproj --configuration Release --no-build -p:CourseImplementation=Solution --results-directory projects/tasks/tests/Tasks.Tests/TestResults -- --coverage --coverage-output tasks.cobertura.xml --coverage-output-format cobertura --coverage-settings projects/tasks/tests/Tasks.Tests/coverage.runsettings
          dotnet run --project tools/CourseVerifier --configuration Release --no-build -- coverage projects/tasks/tests/Tasks.Tests/TestResults 0.85
          dotnet test --project capstones/comparative/tests/ComparativeKv.Tests.csproj --configuration Release --no-build -p:ComparativeImplementation=Solution --results-directory capstones/comparative/tests/TestResults -- --coverage --coverage-output comparative.cobertura.xml --coverage-output-format cobertura --coverage-settings capstones/comparative/tests/coverage.runsettings
          dotnet run --project tools/CourseVerifier --configuration Release --no-build -- coverage capstones/comparative/tests/TestResults 0.85
          dotnet test --project capstones/idiomatic/tests/ReadingLog.Tests.csproj --configuration Release --no-build -p:CapstoneImplementation=Solution --results-directory capstones/idiomatic/tests/TestResults -- --coverage --coverage-output idiomatic.cobertura.xml --coverage-output-format cobertura --coverage-settings capstones/idiomatic/tests/coverage.runsettings
          dotnet run --project tools/CourseVerifier --configuration Release --no-build -- coverage capstones/idiomatic/tests/TestResults 0.85

      - name: Verify external documentation links
        if: matrix.os == 'ubuntu-latest'
        run: dotnet run --project tools/CourseVerifier --configuration Release --no-build -- external-links
